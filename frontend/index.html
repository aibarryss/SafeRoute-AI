<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeRoute AI</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Шапка -->
    <div id="header">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h1>🛡️ SafeRoute AI</h1>
          <p>Безопасные маршруты Семея</p>
        </div>
        <button id="manage-districts-btn" class="manage-btn" title="Управление районами">⚙️</button>
      </div>
    </div>

    <!-- Модальное окно управления районами -->
    <div id="districts-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Управление районами</h2>
          <button class="close-modal-btn">&times;</button>
        </div>
        <div class="modal-body">
          <p style="color: #888; font-size: 12px; margin-bottom: 12px;">
            Обновите уровни опасности районов (1-10). Изменения автоматически синхронизируются с ML моделью.
          </p>
          <div id="districts-list"></div>
          <div style="display: flex; gap: 8px; margin-top: 16px;">
            <button id="save-districts-btn" class="primary-btn">Сохранить</button>
            <button id="reset-districts-btn" class="secondary-btn">Сбросить</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Карта -->
    <div id="map"></div>

    <!-- Панель снизу -->
    <div id="panel">
      <!-- Кнопки режимов -->
      <div id="modes">
        <button class="mode-btn active" data-mode="car">🚗 Машина</button>
        <button class="mode-btn" data-mode="child">👶 Ребёнок</button>
        <button class="mode-btn" data-mode="tourist">🧳 Турист</button>
      </div>

      <!-- Поля ввода с автокомплитом -->
      <div id="inputs">
        <div class="search-container">
          <input
            type="text"
            id="input-from"
            placeholder="📍 Откуда"
            autocomplete="off"
          />
          <button class="geolocate-btn" id="geolocate-from-btn" title="Моё местоположение">📍</button>
          <div class="search-dropdown" id="dropdown-from"></div>
        </div>
        <div class="search-container">
          <input
            type="text"
            id="input-to"
            placeholder="🏁 Куда"
            autocomplete="off"
          />
          <button class="geolocate-btn" id="geolocate-to-btn" title="Моё местоположение">📍</button>
          <div class="search-dropdown" id="dropdown-to"></div>
        </div>
      </div>

      <!-- Кнопка построить маршрут -->
      <button id="build-route-btn">Построить маршрут</button>

      <!-- Объяснение от ИИ -->
      <div id="ai-explanation" class="hidden">
        <div id="ai-text">Здесь появится объяснение маршрута...</div>
      </div>
    </div>

    <script src="https://mapgl.2gis.com/api/js/v1"></script>
    <script src="app.js"></script>
  </body>
</html>
