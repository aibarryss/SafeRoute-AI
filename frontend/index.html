<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeRoute AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
 
    <!-- Шапка -->
    <div id="header">
        <h1>🛡️ SafeRoute AI</h1>
        <p>Безопасные маршруты Семея</p>
    </div>
 
    <!-- Карта -->
    <div id="map"></div>
 
    <!-- Панель снизу -->
    <div id="panel">
 
        <!-- Кнопки режимов -->
        <div id="modes">
            <button class="mode-btn active" data-mode="car">🚗 Машина</button>
            <button class="mode-btn" data-mode="child">👶 Ребёнок</button>
            <button class="mode-btn" data-mode="tourist">🧳 Турист</button>
        </div>
 
        <!-- Поля ввода с автокомплитом -->
        <div id="inputs">
            <div class="search-container">
                <input type="text" id="input-from" placeholder="📍 Откуда" autocomplete="off" />
                <div class="search-dropdown" id="dropdown-from"></div>
            </div>
            <div class="search-container">
                <input type="text" id="input-to" placeholder="🏁 Куда" autocomplete="off" />
                <div class="search-dropdown" id="dropdown-to"></div>
            </div>
        </div>
 
        <!-- Кнопка построить маршрут -->
        <button id="build-route-btn">Построить маршрут</button>


        <!-- Объяснение от ИИ -->
        <div id="ai-explanation" class="hidden">
            <div id="ai-text">Здесь появится объяснение маршрута...</div>
        </div>
 
    </div>
 
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
